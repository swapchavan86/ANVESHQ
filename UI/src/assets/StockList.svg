<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8bc34a;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <rect x="45" y="110" width="18" height="35" fill="url(#chartGradient)" rx="2">
    <animate attributeName="height" values="35;45;35" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="110;100;110" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="70" y="95" width="18" height="50" fill="url(#chartGradient)" rx="2">
    <animate attributeName="height" values="50;60;50" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="95;85;95" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="95" y="75" width="18" height="70" fill="url(#chartGradient)" rx="2">
    <animate attributeName="height" values="70;80;70" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="75;65;75" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </rect>
  
  <rect x="120" y="55" width="18" height="90" fill="url(#chartGradient)" rx="2">
    <animate attributeName="height" values="90;100;90" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="y" values="55;45;55" dur="2s" begin="0.9s" repeatCount="indefinite"/>
  </rect>
  
  <path d="M 40 120 L 65 105 L 90 85 L 115 65 L 145 40" 
        stroke="url(#accentGradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <polygon points="145,40 135,35 140,45" fill="url(#accentGradient)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  
  <path d="M 148 65 L 158 65 M 148 72 L 158 72 M 150 65 L 150 85 L 158 77" 
        stroke="#ffc107" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round"/>
  
  <text x="100" y="170" font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
        font-size="22" 
        font-weight="700" 
        fill="white" 
        text-anchor="middle">StockList</text>
  
  <text x="100" y="185" font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
        font-size="9" 
        font-weight="400" 
        fill="#4caf50" 
        text-anchor="middle" 
        letter-spacing="1">MOMENTUM TRACKER</text>
</svg>