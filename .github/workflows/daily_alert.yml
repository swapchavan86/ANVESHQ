name: "Anveshq: Daily Signal Alert"

on:
  schedule:
    # Mon-Fri 16:30 UTC = 10:00 PM IST; runs 4 hours after daily_scan.
    - cron: "30 16 * * 1-5"
  workflow_dispatch:

jobs:
  daily-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install SQLCipher build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlcipher-dev

      - name: Install dependencies
        working-directory: Backend
        run: python -m pip install -r requirements.txt

      - name: Run schema migration
        env:
          MODE: ${{ secrets.MODE || 'PROD' }}
          DATABASE_PATH: data/anveshq.db
          TEST_DATABASE_PATH: data/test_anveshq.db
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NSE_EQUITY_LIST_URL: ${{ secrets.NSE_EQUITY_LIST_URL }}
          MARKET_REGIME_INDEX: ${{ secrets.MARKET_REGIME_INDEX }}
          DAILY_ALERT_ENABLED: ${{ secrets.DAILY_ALERT_ENABLED || 'true' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        working-directory: Backend
        run: python -c "from src.database import ensure_momentum_schema_columns; ensure_momentum_schema_columns()"

      - name: Run daily alert
        env:
          MODE: ${{ secrets.MODE || 'PROD' }}
          DATABASE_PATH: data/anveshq.db
          TEST_DATABASE_PATH: data/test_anveshq.db
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL || 'false' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          NSE_EQUITY_LIST_URL: ${{ secrets.NSE_EQUITY_LIST_URL }}
          MARKET_REGIME_INDEX: ${{ secrets.MARKET_REGIME_INDEX }}
          DAILY_ALERT_ENABLED: ${{ secrets.DAILY_ALERT_ENABLED || 'true' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        working-directory: Backend
        run: python -m src.daily_alert
