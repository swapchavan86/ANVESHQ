name: "Fluxmind: Daily Intelligence Engine"

on:
  schedule:
    # Runs at 12:30 UTC every day (6:00 PM IST)
    - cron: "30 12 * * *"
  workflow_dispatch:

jobs:
  fluxmind-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Install dependencies
        working-directory: Backend
        run: python -m pip install -r requirements.txt

      - name: Run Fluxmind engine
        env:
          MODE: ${{ secrets.MODE || 'PROD' }}
          DATABASE_PATH: data/anveshq.db
          TEST_DATABASE_PATH: data/test_anveshq.db
          NSE_EQUITY_LIST_URL: ${{ secrets.NSE_EQUITY_LIST_URL }}
          NSE_NIFTY500_CSV_URL: ${{ secrets.NSE_NIFTY500_CSV_URL }}
          BSE_CM_CSV_URL: ${{ secrets.BSE_CM_CSV_URL }}
          BHAVCOPY_URL_TEMPLATE: ${{ secrets.BHAVCOPY_URL_TEMPLATE }}
          FUNDAMENTAL_CHECK_ENABLED: ${{ secrets.FUNDAMENTAL_CHECK_ENABLED }}
          MIN_PRICE: ${{ secrets.MIN_PRICE }}
          MIN_MCAP_CRORES: ${{ secrets.MIN_MCAP_CRORES }}
          STREAK_THRESHOLD_DAYS: ${{ secrets.STREAK_THRESHOLD_DAYS }}
          NEAR_52_WEEK_HIGH_THRESHOLD: ${{ secrets.NEAR_52_WEEK_HIGH_THRESHOLD }}
          VOLUME_CONFIRMATION_FACTOR: ${{ secrets.VOLUME_CONFIRMATION_FACTOR }}
          RELATIVE_LIQUIDITY_FACTOR: ${{ secrets.RELATIVE_LIQUIDITY_FACTOR }}
          REPETITION_COOLDOWN_DAYS: ${{ secrets.REPETITION_COOLDOWN_DAYS }}
          BREAKOUT_LOOKBACK_DAYS: ${{ secrets.BREAKOUT_LOOKBACK_DAYS }}
          MAX_RANK: ${{ secrets.MAX_RANK }}
          DECAY_FACTOR: ${{ secrets.DECAY_FACTOR }}
        working-directory: Backend
        run: python -m src.main

      - name: Commit and push DB updates
        run: |
          if [ ! -f data/anveshq.db ]; then
            echo "SQLite DB file not found, skipping commit."
            exit 0
          fi
          if git diff-index --quiet HEAD -- data/anveshq.db; then
            echo "No DB changes to commit."
            exit 0
          fi
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/anveshq.db
          git commit -m "chore: daily database update"
          git push || (git pull --rebase --autostash && git push)
