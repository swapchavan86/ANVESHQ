name: 'Maintenance: Cleanup Old Workflow Runs'

on:
  schedule:
    # Runs daily at 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete completed workflow runs older than 7 days
        uses: actions/github-script@v7
        with:
          script: |
            const DAYS_TO_KEEP = 7;
            const cutoff = new Date(Date.now() - DAYS_TO_KEEP * 24 * 60 * 60 * 1000);

            let page = 1;
            const per_page = 100;
            let totalDeleted = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page,
                page,
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                const createdAt = new Date(run.created_at);
                if (run.status === 'completed' && createdAt < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id,
                  });
                  totalDeleted += 1;
                }
              }

              page += 1;
            }

            core.info(`Deleted ${totalDeleted} completed workflow runs older than ${DAYS_TO_KEEP} days.`);
